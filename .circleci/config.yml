version: 2.1

orbs:
  node: circleci/node@7.2.1

jobs:
  build: # this can be any name you choose
    executor: node/default # use the default executor defined within the orb
    steps:
      - checkout
      - node/install:
          node-version: '26.3.0'
      - run: sudo npm install -g npm@latest
      - node/install-packages:
          pkg-manager: npm
          cache-path: ~/project/node_modules
          override-ci-command: npm install
      - run:
          command: npm run build:web
          name: Build app
  preview: # this can be any name you choose
    executor: node/default # use the default executor defined within the orb
    steps:
      - checkout
      - node/install:
          node-version: '26.3.0'
      - run: sudo npm install -g npm@latest
      - run: sudo npm install -g vercel@latest
      - run:
          command: export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_PROD && export VERCEL_ORG_ID=$VERCEL_ORG_ID && vercel --yes --token $VERCEL_TOKEN
          name: Deploy
  production: # this can be any name you choose
    executor: node/default # use the default executor defined within the orb
    steps:
      - checkout
      - node/install:
          node-version: '26.3.0'
      - run: sudo npm install -g npm@latest
      - run: sudo npm install -g vercel@latest
      - run:
          command: export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_PROD && export VERCEL_ORG_ID=$VERCEL_ORG_ID && vercel --prod --yes --token $VERCEL_TOKEN
          name: Deploy

workflows:
  build-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - preview:
          requires:
            - build
          filters:
            branches:
              only:
                - main
      - hold-prod:
          requires:
            - preview
          filters:
            branches:
              only:
                - main
          type: approval
      - production:
          context: admins
          requires:
            - hold-prod
          filters:
            branches:
              only:
                - main